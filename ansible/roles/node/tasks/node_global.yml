- name: Check if node installed
  shell: command -v node
  register: node_exists
  ignore_errors: true

- name: Check if fnm installed
  shell: command -v fnm
  register: fnm_exists
  ignore_errors: true

- name: Creates npm-global directory
  become_user: "{{ lookup('vars', 'username') }}"
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/npm-global"
    state: directory

- name: Creates fnm directory
  become_user: "{{ lookup('vars', 'username') }}"
  file:
    path: "{{ lookup('env', 'HOME') }}/.local/share/fnm"
    state: directory
